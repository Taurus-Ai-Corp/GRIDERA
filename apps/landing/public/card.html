<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Effin · GRIDERA Digital Card</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0E0E10;
  --surface: #161618;
  --ink: #F7F5F1;
  --mute: #A0A0A5;
  --accent: #4ADE80;
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
body {
  width: 100vw;
  height: 100vh;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
}
.card {
  width: 85mm;
  height: 55mm;
  background: var(--surface);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 5mm;
  color: var(--ink);
  display: grid;
  grid-template-rows: auto 1fr auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.brand {
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 8px;
  line-height: 1.4;
}
.brand .corp { color: var(--ink); font-weight: 700; }
.brand .product { color: var(--accent); margin-top: 1px; }
.qr img { width: 18mm; height: 18mm; }
.main {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.name { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.title { font-size: 10px; color: var(--accent); margin-top: 1mm; }
.tagline {
  font-size: 8px;
  color: var(--mute);
  margin-top: 2mm;
  line-height: 1.4;
  max-width: 55mm;
}
footer {
  font-size: 8px;
  color: var(--mute);
  line-height: 1.5;
}
footer a { color: var(--mute); text-decoration: none; }
@page { size: 85mm 55mm; margin: 0; }
@media print { body { background: #222; } }

html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
body { overscroll-behavior-y: none; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
img, video { max-width: 100%; height: auto; content-visibility: auto; }
button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.card { will-change: transform; transform: translateZ(0); }
</style>
<link rel="icon" type="image/png" href="/gridera-logo.png">
<meta name="theme-color" content="#080A0F">
<meta name="apple-mobile-web-app-capable" content="yes">

</head>

  </header>
  <div class="main">
    <div class="name">Effin Fernandez</div>
